<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нейросеть</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f2f4f7;
}

.container {
  max-width: 420px;
  margin: 30px auto;
  padding: 15px;
}

.card {
  background: #fff;
  border-radius: 22px;
  padding: 25px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

.avatar {
  width: 95px;
  height: 95px;
  border-radius: 50%;
  margin: 0 auto 15px;
  border: 4px solid #7ed957;
  background: url('https://i.imgur.com/7yUvePI.png') center/cover;
}

h1 {
  font-size: 26px;
  margin: 10px 0 20px;
}

.step-title {
  color: #5b8def;
  font-weight: 600;
  margin-top: 20px;
}

.box {
  background: #eef3f8;
  border-radius: 15px;
  padding: 20px;
  margin-top: 10px;
}

.btn {
  display: block;
  text-decoration: none;
  padding: 16px;
  border-radius: 14px;
  font-weight: 600;
  margin-top: 15px;
  transition: 0.2s;
}

.btn:active {
  transform: scale(0.97);
}

.green {
  background: linear-gradient(90deg,#00c853,#00e676);
  color: white;
}

.blue {
  background: linear-gradient(90deg,#3b82f6,#2563eb);
  color: white;
}

.small {
  font-size: 12px;
  color: #777;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <div class="avatar"></div>

    <h1>Нейросеть</h1>

    <div class="step-title">Шаг 1</div>
    <div class="box">
      <p>Подключите прокси</p>

      <!-- 🔴 ВСТАВЬ СВОЙ ПРОКСИ -->
      <a class="btn green" href="https://t.me/proxy?server=IP&port=443&secret=SECRET">
        Ускорить Telegram 🚀
      </a>

      <div class="small">1 клик • Бесплатно • Безопасно</div>
    </div>

    <div class="step-title">Шаг 2</div>

    <!-- 🔵 ВСТАВЬ СВОЕГО БОТА -->
    <a class="btn blue" href="https://t.me/your_bot">
      Открыть в Telegram →
    </a>

  </div>
</div>

</body>
</html>
