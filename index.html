<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Создание прокси страницы</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  background: #f3f4f6;
  padding: 30px;
}

.box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  max-width: 500px;
  margin: auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #0ea5e9;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  word-break: break-all;
}
</style>
</head>

<body>

<div class="box">
  <h2>⚙️ Создать прокси-страницу</h2>

  <input id="proxy" placeholder="tg://proxy?...">
  <input id="channel" placeholder="https://t.me/username">

  <button onclick="generate()">Создать страницу</button>

  <div class="result" id="result"></div>
</div>

<script>
function generate() {
  let proxy = document.getElementById('proxy').value;
  let channel = document.getElementById('channel').value;

  let page = `
  <html>
  <body style="text-align:center;font-family:sans-serif;padding:50px;">
    <h2>Подключение...</h2>
    <a href="${proxy}">Подключить прокси</a><br><br>
    <a href="${channel}">Перейти в канал</a>

    <script>
      setTimeout(()=>{
        window.location.href="${proxy}"
      },1000)
    <\/script>
  </body>
  </html>
  `;

  let blob = new Blob([page], { type: 'text/html' });
  let url = URL.createObjectURL(blob);

  document.getElementById('result').innerHTML =
    "👉 Ссылка: <a href='" + url + "' target='_blank'>" + url + "</a>";
}
</script>

</body>
</html>
