  color: white;
}

.container {
  max-width: 420px;
  margin: 40px auto;
  padding: 15px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 25px;
  padding: 25px;
  text-align: center;

.avatar {

}

.box {

}

.btn {

  padding: 16px;
  border-radius: 14px;
  font-weight: 600;

}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.green {
  background: linear-gradient(90deg,#00c853,#00e676);
  color: white;
}

.blue {
  background: linear-gradient(90deg,#3b82f6,#2563eb);
  color: white;
}

.small {
  font-size: 12px;
  color: #ccc;
  margin-top: 10px;
}
</style>
</head>
